<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Labour Book Pro</title>

<style>
body { font-family: Arial; margin:0; background:#f1f5f9; }

.header {
  background:#16a34a;
  color:white;
  padding:15px;
  display:flex;
  justify-content:space-between;
}

.add-btn {
  background:white;
  color:#16a34a;
  padding:8px 12px;
  border-radius:8px;
  cursor:pointer;
}

.container { padding:10px; }

.worker {
  background:white;
  padding:12px;
  border-radius:10px;
  margin:10px 0;
  box-shadow:0 2px 5px rgba(0,0,0,0.1);
  position:relative;
}

.edit-btn {
  position:absolute;
  top:8px;
  right:8px;
  background:#16a34a;
  color:white;
  padding:5px 8px;
  border-radius:6px;
  cursor:pointer;
}

.menu-box {
  position:absolute;
  top:35px;
  right:8px;
  background:white;
  border:1px solid #ccc;
  border-radius:6px;
  display:none;
}

.menu-item { padding:8px; cursor:pointer; }

.calendar-bar {
  display:flex;
  justify-content:space-between;
  align-items:center;
  background:#16a34a;
  color:white;
  padding:10px;
  border-radius:10px;
}

.nav-btn {
  background:white;
  color:#16a34a;
  padding:5px 10px;
  border-radius:6px;
  cursor:pointer;
}

.week {
  display:grid;
  grid-template-columns:repeat(7,1fr);
  margin-top:10px;
  text-align:center;
  font-weight:bold;
}

.calendar {
  display:grid;
  grid-template-columns:repeat(7,1fr);
  gap:5px;
  margin-top:5px;
}

.day {
  background:white;
  padding:10px;
  border-radius:8px;
  text-align:center;
  cursor:pointer;
}

.present { background:#22c55e; color:white; }
.absent { background:#ef4444; color:white; }

/* TODAY highlight */
.today {
  border:2px solid blue;
}

.summary {
  margin-top:10px;
  background:white;
  padding:10px;
  border-radius:10px;
  font-weight:bold;
}

.hidden { display:none; }

/* FORM */
.form-box {
  position:fixed;
  top:0; left:0;
  width:100%; height:100%;
  background:rgba(0,0,0,0.4);
  display:none;
  justify-content:center;
  align-items:center;
}

.form {
  background:white;
  padding:20px;
  border-radius:10px;
  width:300px;
}

input {
  width:100%;
  padding:8px;
  margin:5px 0;
}

.save-btn {
  background:#16a34a;
  color:white;
  padding:8px;
  border:none;
  width:100%;
}
</style>
</head>

<body>

<div class="header">
  <div>📘 Labour Book</div>
  <div class="add-btn" onclick="openForm()">+ Add</div>
</div>

<div class="container" id="workerList"></div>

<!-- FORM -->
<div class="form-box" id="formBox">
  <div class="form">
    <h3>Add Worker</h3>
    <input id="name" placeholder="Name">
    <input id="des" placeholder="Designation">
    <input id="wage" placeholder="Daily Wage">
    <button class="save-btn" onclick="saveWorker()">Save</button>
  </div>
</div>

<!-- CALENDAR -->
<div class="container hidden" id="calendarView">
  <h3 id="workerTitle"></h3>

  <div class="calendar-bar">
    <div class="nav-btn" onclick="prevMonth()">⬅</div>
    <div id="monthYear"></div>
    <div class="nav-btn" onclick="nextMonth()">➡</div>
  </div>

  <div class="week">
    <div>Sun</div><div>Mon</div><div>Tue</div>
    <div>Wed</div><div>Thu</div><div>Fri</div><div>Sat</div>
  </div>

  <div class="calendar" id="calendar"></div>

  <!-- 🔥 SUMMARY -->
  <div class="summary" id="summary"></div>

  <button onclick="back()">⬅ Back</button>
</div>

<script>

let workers=[];
let currentIndex=null;
let currentDate=new Date();

function openForm(){
  document.getElementById("formBox").style.display="flex";
}

function saveWorker(){
  let name=document.getElementById("name").value;
  let des=document.getElementById("des").value;
  let wage=document.getElementById("wage").value;

  if(!name||!des||!wage) return;

  workers.push({name,designation:des,wage:wage,days:{}});
  document.getElementById("formBox").style.display="none";
  displayWorkers();
}

function toggleMenu(i){
  let m=document.getElementById("menu"+i);
  m.style.display=m.style.display==="block"?"none":"block";
}

function editWorker(i){
  document.getElementById("name").value=workers[i].name;
  document.getElementById("des").value=workers[i].designation;
  document.getElementById("wage").value=workers[i].wage;
  openForm();
  workers.splice(i,1);
}

function deleteWorker(i){
  workers.splice(i,1);
  displayWorkers();
}

function displayWorkers(){
  let div=document.getElementById("workerList");
  div.innerHTML="";

  workers.forEach((w,i)=>{
    div.innerHTML+=`
      <div class="worker">
        <div class="edit-btn" onclick="toggleMenu(${i});event.stopPropagation()">⋮</div>

        <div class="menu-box" id="menu${i}">
          <div class="menu-item" onclick="editWorker(${i})">Edit</div>
          <div class="menu-item" onclick="deleteWorker(${i})">Delete</div>
        </div>

        <div onclick="openCalendar(${i})">
          <b>${w.name}</b><br>
          ${w.designation}<br>
          ₹${w.wage}
        </div>
      </div>
    `;
  });
}

function openCalendar(i){
  currentIndex=i;
  document.getElementById("workerList").classList.add("hidden");
  document.getElementById("calendarView").classList.remove("hidden");
  document.getElementById("workerTitle").innerText=workers[i].name;
  generateCalendar();
}

function back(){
  document.getElementById("workerList").classList.remove("hidden");
  document.getElementById("calendarView").classList.add("hidden");
}

function prevMonth(){ currentDate.setMonth(currentDate.getMonth()-1); generateCalendar(); }
function nextMonth(){ currentDate.setMonth(currentDate.getMonth()+1); generateCalendar(); }

function generateCalendar(){
  let cal=document.getElementById("calendar");
  cal.innerHTML="";

  let m=currentDate.getMonth();
  let y=currentDate.getFullYear();

  let today=new Date();

  let months=["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
  document.getElementById("monthYear").innerText=months[m]+" "+y;

  let firstDay=new Date(y,m,1).getDay();
  let days=new Date(y,m+1,0).getDate();

  let presentCount=0;

  for(let i=0;i<firstDay;i++){
    cal.innerHTML+=`<div></div>`;
  }

  for(let d=1; d<=days; d++){
    let key=y+"-"+(m+1)+"-"+d;
    let status=workers[currentIndex].days[key];

    let cls="";
    if(status=="P"){ cls="present"; presentCount++; }
    if(status=="A") cls="absent";

    // TODAY check
    if(d===today.getDate() && m===today.getMonth() && y===today.getFullYear()){
      cls += " today";
    }

    cal.innerHTML+=`
      <div class="day ${cls}" onclick="markDay('${key}')">
        ${d}<br>${status?status:""}
      </div>
    `;
  }

  let wage=workers[currentIndex].wage;
  let salary=presentCount * wage;

  document.getElementById("summary").innerText =
    "Present: " + presentCount +
    " | Salary: ₹" + salary;
}

function markDay(key){
  let c=prompt("P or A").toUpperCase();
  if(c!="P"&&c!="A") return;

  workers[currentIndex].days[key]=c;
  generateCalendar();
}

displayWorkers();

</script>

</body>
</html>
